<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Шахтёр — Мини-Апп</title>
  <style>
    :root {
      --bg: #0f0f1a;
      --card: rgba(22, 33, 62, 0.9);
      --text: #eee;
      --accent: #e15f41;
      --accent2: #f7d794;
      --btn-text: #fff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #07070f;
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }
    /* Анимированный фон */
    .mine-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }
    .tunnel {
      position: absolute; bottom: 0; left: 0; width: 100%; height: 30%;
      background: linear-gradient(0deg, #1a1005 0%, transparent 100%);
    }
    .reel {
      position: absolute; bottom: 10%; left: 0; width: 100%; height: 4px;
      background: repeating-linear-gradient(90deg, #8b7355 0px, #8b7355 20px, transparent 20px, transparent 30px);
      animation: moveReel 2s linear infinite;
    }
    @keyframes moveReel { 0% { transform: translateX(0); } 100% { transform: translateX(-30px); } }
    .cart {
      position: absolute; bottom: 12%; width: 40px; height: 25px;
      background: #5e3a1c; border-radius: 4px 4px 8px 8px;
      box-shadow: inset 0 -4px 0 #3a2210;
      animation: moveCart 8s linear infinite;
      opacity: 0.6;
    }
    .cart::after {
      content: ''; position: absolute; top: -8px; left: 8px;
      width: 10px; height: 10px; background: #c49a6c; border-radius: 50%;
    }
    .cart:nth-child(2) { bottom: 18%; animation-duration: 12s; animation-delay: -3s; }
    .cart:nth-child(3) { bottom: 14%; animation-duration: 10s; animation-delay: -6s; }
    @keyframes moveCart {
      0% { left: -10%; }
      100% { left: 110%; }
    }
    .floating-diamond {
      position: absolute; width: 12px; height: 12px;
      background: radial-gradient(circle, #fff 20%, #a0e0ff 80%);
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      opacity: 0.4;
      animation: floatDiamond 6s infinite ease-in-out;
    }
    .floating-diamond:nth-child(4) { left: 10%; top: 20%; animation-delay: 0s; }
    .floating-diamond:nth-child(5) { left: 30%; top: 60%; animation-delay: -2s; width: 8px; height: 8px; }
    .floating-diamond:nth-child(6) { left: 70%; top: 15%; animation-delay: -4s; width: 15px; height: 15px; }
    .floating-diamond:nth-child(7) { left: 85%; top: 70%; animation-delay: -1s; }
    @keyframes floatDiamond {
      0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
      50% { transform: translateY(-20px) rotate(45deg); opacity: 0.7; }
    }
    .lamp {
      position: absolute; top: 10%; left: 50%; transform: translateX(-50%);
      width: 60px; height: 80px; background: radial-gradient(ellipse at center, rgba(255,200,100,0.3) 0%, transparent 70%);
      border-radius: 50%;
      animation: flicker 3s infinite alternate;
    }
    @keyframes flicker { 0% { opacity: 0.5; } 100% { opacity: 0.9; } }

    .game {
      width: 100%; max-width: 420px; padding: 16px;
      display: flex; flex-direction: column; gap: 14px;
      position: relative; z-index: 1;
    }
    .resources, .bonuses-panel, .sell-panel, .content {
      background: var(--card); backdrop-filter: blur(10px);
      border-radius: 16px; padding: 14px 18px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    }
    .resources {
      display: flex; justify-content: space-between;
    }
    .resource { display: flex; align-items: center; gap: 6px; font-weight: 600; }
    .bonuses-panel {
      display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 0.85em;
    }
    .actions {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }
    .mine-btn {
      width: 110px; height: 110px; border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, var(--accent2), var(--accent));
      border: none; color: white; font-size: 2.4em; cursor: pointer;
      box-shadow: 0 8px 24px rgba(225,95,65,0.6);
      transition: transform 0.05s, box-shadow 0.1s;
      user-select: none; -webkit-user-select: none;
      touch-action: manipulation;
    }
    .mine-btn:active, .mine-btn.pressed {
      transform: scale(0.94);
      box-shadow: 0 4px 12px rgba(225,95,65,0.9);
    }
    .sell-panel { display: flex; justify-content: space-between; align-items: center; }
    button {
      background: var(--accent); border: none; color: var(--btn-text);
      padding: 10px 18px; border-radius: 14px; font-weight: 600;
      cursor: pointer; transition: 0.15s; font-size: 0.9em;
    }
    button:active { background: #c14932; }
    button:disabled { opacity: 0.5; pointer-events: none; }
    button.dark { background: #2c3e50; }
    .tabs { display: flex; gap: 8px; justify-content: center; }
    .tab {
      padding: 10px 18px; background: var(--card); border-radius: 14px;
      cursor: pointer; font-weight: 600; opacity: 0.7; transition: 0.2s;
    }
    .tab.active { opacity: 1; background: var(--accent); }
    .content { min-height: 200px; }
    .shop-item, .miner-row, .quest-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .btn-sm { padding: 6px 14px; font-size: 0.85em; }
    .offline-info { text-align: center; font-size: 0.85em; opacity: 0.8; }
    .prod { font-size: 0.8em; opacity: 0.7; }
    .loot-popup {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: #2c3e50; color: white; padding: 12px 24px; border-radius: 16px;
      z-index: 999; box-shadow: 0 8px 20px rgba(0,0,0,0.5); font-weight: 600;
      animation: fadeInOut 2.5s forwards; white-space: pre-line; text-align: center;
    }
    @keyframes fadeInOut {
      0% { opacity: 0; top: 0; } 15% { opacity: 1; top: 20px; }
      75% { opacity: 1; top: 20px; } 100% { opacity: 0; top: 0; }
    }
    .profile-field { margin: 8px 0; }
    .profile-field a { color: #f7d794; word-break: break-all; }
    .admin-panel { border: 2px solid gold; padding: 10px; border-radius: 12px; margin-top: 10px; }
  </style>
</head>
<body>
<div class="mine-bg">
  <div class="tunnel"></div>
  <div class="reel"></div>
  <div class="cart"></div><div class="cart"></div><div class="cart"></div>
  <div class="floating-diamond"></div><div class="floating-diamond"></div><div class="floating-diamond"></div><div class="floating-diamond"></div>
  <div class="lamp"></div>
</div>
<div class="game">
  <div class="resources">
    <div class="resource">💎 <span id="diamondsDisplay">0</span></div>
    <div class="resource">💰 <span id="moneyDisplay">0</span></div>
    <div class="resource">🛢️ <span id="oilDisplay">0</span></div>
  </div>
  <div class="bonuses-panel" id="bonusesPanel"></div>
  <div class="actions">
    <button class="mine-btn" id="mineButton">⛏️</button>
    <div style="font-size:0.9em; opacity:0.7;">+<span id="clickValue">1</span> за клик</div>
    <div class="offline-info" id="autoInfo">⛏️ 0 💎/сек | 🛢️ 0/сек</div>
  </div>
  <div class="sell-panel">
    <span>💎 → 💰 1 = 0.05</span>
    <button id="sellAllBtn" class="dark">Продать всё</button>
  </div>
  <div class="tabs">
    <div class="tab active" data-tab="miners">👷 Шахтёры</div>
    <div class="tab" data-tab="shop">🛒 Магазин</div>
    <div class="tab" data-tab="quests">📋 Задания</div>
    <div class="tab" data-tab="profile">👤 Профиль</div>
  </div>
  <div class="content" id="tabContent"></div>
</div>

<script>
  (() => {
    // Telegram
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }
    const currentUser = tg?.initDataUnsafe?.user || { id: 0, first_name: 'Гость' };
    const userId = currentUser.id;
    const isAdmin = userId === 998579758;

    // Игровое состояние
    const defaultState = {
      diamonds: 0, money: 0, oil: 0,
      pickaxeLevel: 1,
      miners: [0,0,0,0,0,0,0],
      oilMiner: 0,
      globalMinerMult: 1.0, flatMinerBonus: 0,
      oilPerSecBonus: 0, critChance: 0,
      boostActive: false, boostEnd: 0,
      dailyOilDate: null,
      completedQuests: [],
      totalClicks: 0, totalDiamondsMined: 0,
      totalMinersHired: 0, totalUpgrades: 0,
      lastSaveTime: Date.now(),
      registered: false,
      invitedBy: null,
      playTimeStart: Date.now(),
      totalPlayTime: 0
    };
    let state = JSON.parse(JSON.stringify(defaultState));

    // Базы шахтёров
    const minerBase = [
      { lvl:1, baseProd:0.1, baseCost:15 },
      { lvl:2, baseProd:0.25, baseCost:40 },
      { lvl:3, baseProd:0.5, baseCost:100 },
      { lvl:4, baseProd:1.0, baseCost:250 },
      { lvl:5, baseProd:2.0, baseCost:600 },
      { lvl:6, baseProd:4.0, baseCost:1500 },
      { lvl:7, baseProd:8.0, baseCost:4000 }
    ];
    const OIL_MINER_COST = 200;
    const OIL_MINER_PROD = 0.05;

    function getMinerCost(idx) {
      const cnt = state.miners[idx];
      return Math.floor(minerBase[idx].baseCost * (1 + 0.35 * cnt));
    }
    function getPickaxeCost() {
      return Math.floor(20 * Math.pow(1.6, state.pickaxeLevel - 1));
    }

    // Загрузка
    function loadState() {
      try {
        const saved = localStorage.getItem('minerGameV5');
        if (saved) {
          const parsed = JSON.parse(saved);
          state = { ...defaultState, ...parsed };
          if (!Array.isArray(state.miners) || state.miners.length !== 7) state.miners = [0,0,0,0,0,0,0];
          if (!Array.isArray(state.completedQuests)) state.completedQuests = [];
          if (state.boostEnd && state.boostEnd < Date.now()) { state.boostActive = false; state.boostEnd = 0; }
        }
      } catch(e) {}
    }
    function saveState() {
      state.lastSaveTime = Date.now();
      // сохраняем общее время игры
      if (state.playTimeStart) {
        state.totalPlayTime += Date.now() - state.playTimeStart;
      }
      state.playTimeStart = Date.now();
      try { localStorage.setItem('minerGameV5', JSON.stringify(state)); } catch(e) {}
    }

    // Регистрация и рефералы
    function register() {
      if (state.registered) return;
      state.registered = true;
      state.money += 50; // стартовый бонус
      // проверяем реф-ссылку
      const urlParams = new URLSearchParams(window.location.search);
      const refParam = urlParams.get('ref');
      if (refParam && !isNaN(refParam)) {
        const refId = parseInt(refParam);
        if (refId !== userId) {
          state.invitedBy = refId;
          state.money += 1000; // бонус новому
          showPopup('🎁 Вы пришли по реф-ссылке! +1000💰');
          // Попытаемся сохранить для пригласившего (в его localStorage это не попадёт)
          // Вместо этого админ может начислить вручную.
        }
      }
      saveState();
    }

    // Офлайн-прогресс
    function applyOfflineProgress() {
      const now = Date.now();
      const elapsedSec = (now - state.lastSaveTime) / 1000;
      if (elapsedSec < 5) return;
      const effectiveSec = Math.min(elapsedSec, 8 * 3600);
      let diamondsGain = 0, oilGain = 0;
      for (let i = 0; i < 7; i++) {
        const cnt = state.miners[i];
        if (cnt > 0) {
          const prod = minerBase[i].baseProd * state.globalMinerMult + state.flatMinerBonus;
          diamondsGain += prod * cnt * effectiveSec;
        }
      }
      oilGain += state.oilMiner * OIL_MINER_PROD * effectiveSec + state.oilPerSecBonus * effectiveSec;
      if (diamondsGain > 0.5 || oilGain > 0.001) {
        state.diamonds += diamondsGain;
        state.totalDiamondsMined += diamondsGain;
        state.oil += oilGain;
        showPopup(`⏳ Пока вас не было:\n💎 +${Math.floor(diamondsGain)}\n🛢️ +${oilGain.toFixed(2)}`);
      }
    }

    function showPopup(text) {
      const div = document.createElement('div');
      div.className = 'loot-popup';
      div.textContent = text;
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 2500);
    }

    // Игровые действия
    function doClick() {
      let gain = state.pickaxeLevel;
      if (state.boostActive && Date.now() < state.boostEnd) gain *= 2;
      if (state.critChance > 0 && Math.random() < state.critChance) {
        gain *= 2; showPopup('💥 Критический удар! x2');
      }
      state.diamonds += gain;
      state.totalDiamondsMined += gain;
      state.totalClicks++;
      updateUI(); saveState(); checkQuests();
    }

    // Удержание кнопки
    let holdInterval = null;
    const mineBtn = document.getElementById('mineButton');
    function startHold(e) {
      e.preventDefault();
      if (holdInterval) return;
      mineBtn.classList.add('pressed');
      holdInterval = setInterval(doClick, 100);
    }
    function stopHold() {
      if (holdInterval) {
        clearInterval(holdInterval);
        holdInterval = null;
        mineBtn.classList.remove('pressed');
      }
    }
    mineBtn.addEventListener('mousedown', startHold);
    mineBtn.addEventListener('touchstart', startHold, {passive: false});
    mineBtn.addEventListener('mouseup', stopHold);
    mineBtn.addEventListener('mouseleave', stopHold);
    mineBtn.addEventListener('touchend', stopHold);
    mineBtn.addEventListener('touchcancel', stopHold);

    function sellAll() {
      if (state.diamonds <= 0) return;
      const moneyGain = Math.floor(state.diamonds * 0.05);
      state.money += moneyGain;
      state.diamonds = 0;
      updateUI(); saveState();
    }
    function buyPickaxe() {
      const cost = getPickaxeCost();
      if (state.money >= cost) {
        state.money -= cost; state.pickaxeLevel++; state.totalUpgrades++;
        updateUI(); saveState(); checkQuests();
      }
    }
    function hireMiner(idx) {
      const cost = getMinerCost(idx);
      if (state.money >= cost) {
        state.money -= cost; state.miners[idx]++; state.totalMinersHired++;
        updateUI(); saveState(); checkQuests();
      }
    }
    function hireOilMiner() {
      if (state.oil >= OIL_MINER_COST) {
        state.oil -= OIL_MINER_COST; state.oilMiner++; state.totalMinersHired++;
        updateUI(); saveState(); checkQuests();
      }
    }
    function openBox100() {
      if (state.money < 100) return;
      state.money -= 100; state.totalUpgrades++;
      const r = Math.random();
      let text = '';
      if (r < 0.5) { const amt = 5+Math.floor(Math.random()*6); state.diamonds+=amt; text=`💎 +${amt}`; }
      else if (r < 0.8) { state.money+=20; text='💰 +20'; }
      else if (r < 0.95) { state.oil+=0.2; text='🛢️ +0.2'; }
      else { state.critChance = Math.min(0.5, state.critChance+0.02); text='💥 +2% крит'; }
      showPopup('📦 Простой бокс: '+text); updateUI(); saveState(); checkQuests();
    }
    function openBox1000() {
      if (state.money < 1000) return;
      state.money -= 1000; state.totalUpgrades++;
      const r = Math.random();
      let text = '';
      if (r < 0.25) { const o = 0.1+Math.random()*0.4; state.oil+=o; text=`🛢️ +${o.toFixed(2)}`; }
      else if (r < 0.50) { const a=30+Math.floor(Math.random()*21); state.diamonds+=a; text=`💎 +${a}`; }
      else if (r < 0.70) { state.money+=150; text='💰 +150'; }
      else if (r < 0.85) { state.pickaxeLevel++; text='⛏️ +1 ур. кирки'; }
      else if (r < 0.95) { state.critChance = Math.min(0.5, state.critChance+0.04); text='💥 +4% крит'; }
      else if (r < 0.99) { state.globalMinerMult+=0.03; text='⚙️ +3% добычи'; }
      else { state.flatMinerBonus+=0.5; text='📈 +0.5 бонус'; }
      showPopup('📦 Средний бокс: '+text); updateUI(); saveState(); checkQuests();
    }
    function openPremiumBox() {
      if (state.oil < 10) return;
      state.oil -= 10; state.totalUpgrades++;
      const r = Math.random();
      let text = '';
      if (r < 0.30) {
        state.boostActive = true; state.boostEnd = Date.now() + 5*60*1000;
        text = '🔥 Бустер x2 на 5 мин!';
      } else if (r < 0.60) { state.diamonds+=100; text='💎 +100'; }
      else if (r < 0.80) { state.money+=300; text='💰 +300'; }
      else if (r < 0.90) { state.pickaxeLevel+=2; text='⛏️ +2 ур. кирки'; }
      else if (r < 0.96) { state.oil+=15; text='🛢️ +15'; }
      else if (r < 0.99) { state.oilMiner++; text='🛢️👷 Нефтяной шахтёр!'; }
      else { state.critChance = Math.min(0.5, state.critChance+0.1); text='💥 +10% крит'; }
      showPopup('✨ Премиум бокс: '+text); updateUI(); saveState(); checkQuests();
    }
    function claimDailyOil() {
      const today = new Date().toISOString().split('T')[0];
      if (state.dailyOilDate === today) return;
      state.dailyOilDate = today; state.oil += 2;
      updateUI(); saveState(); showPopup('🎁 Ежедневный бонус: +2 🛢️');
    }
    function canClaimDaily() {
      return state.dailyOilDate !== new Date().toISOString().split('T')[0];
    }

    // Задания
    const quests = [
      { id:'clicks20', desc:'20 кликов', check:()=>state.totalClicks>=20, reward:1 },
      { id:'clicks100', desc:'100 кликов', check:()=>state.totalClicks>=100, reward:2 },
      { id:'diamonds200', desc:'Добыть 200 💎', check:()=>state.totalDiamondsMined>=200, reward:1 },
      { id:'diamonds1000', desc:'Добыть 1000 💎', check:()=>state.totalDiamondsMined>=1000, reward:2 },
      { id:'diamonds5000', desc:'Добыть 5000 💎', check:()=>state.totalDiamondsMined>=5000, reward:3 },
      { id:'hire3', desc:'Нанять 3 шахтёров', check:()=>state.totalMinersHired>=3, reward:1 },
      { id:'hire10', desc:'Нанять 10 шахтёров', check:()=>state.totalMinersHired>=10, reward:2 },
      { id:'hire25', desc:'Нанять 25 шахтёров', check:()=>state.totalMinersHired>=25, reward:3 },
      { id:'pickaxe5', desc:'Кирка 5 ур.', check:()=>state.pickaxeLevel>=5, reward:1 },
      { id:'pickaxe10', desc:'Кирка 10 ур.', check:()=>state.pickaxeLevel>=10, reward:2 },
      { id:'oilminer1', desc:'Нефтяной шахтёр', check:()=>state.oilMiner>=1, reward:5 },
      { id:'oilminer3', desc:'3 нефтяных шахтёра', check:()=>state.oilMiner>=3, reward:10 },
      { id:'upgrade5', desc:'5 улучшений', check:()=>state.totalUpgrades>=5, reward:1 },
      { id:'upgrade15', desc:'15 улучшений', check:()=>state.totalUpgrades>=15, reward:3 }
    ];
    function checkQuests() {}
    function claimQuest(id) {
      const q = quests.find(q=>q.id===id);
      if (!q || state.completedQuests.includes(id)) return;
      if (q.check()) {
        state.completedQuests.push(id); state.oil += q.reward;
        showPopup(`📋 Задание: +${q.reward} 🛢️`); updateUI(); saveState();
      }
    }

    // UI
    let currentTab = 'miners';
    function updateUI() {
      document.getElementById('diamondsDisplay').textContent = Math.floor(state.diamonds);
      document.getElementById('moneyDisplay').textContent = Math.floor(state.money);
      document.getElementById('oilDisplay').textContent = Math.floor(state.oil*100)/100;
      const clickMul = (state.boostActive && Date.now()<state.boostEnd) ? 2 : 1;
      document.getElementById('clickValue').textContent = state.pickaxeLevel * clickMul;

      document.getElementById('bonusesPanel').innerHTML = `
        <div class="bonus-item">⚙️ Множ: <span>${state.globalMinerMult.toFixed(2)}</span></div>
        <div class="bonus-item">📈 Бонус: <span>+${state.flatMinerBonus.toFixed(2)}</span></div>
        <div class="bonus-item">🛢️ Пасс: <span>${(state.oilMiner*OIL_MINER_PROD+state.oilPerSecBonus).toFixed(2)}/с</span></div>
        <div class="bonus-item">💥 Крит: <span>${Math.floor(state.critChance*100)}%</span></div>
        <div class="bonus-item">🔥 Бустер: <span>${(state.boostActive && Date.now()<state.boostEnd) ? Math.ceil((state.boostEnd-Date.now())/60000)+'м' : 'нет'}</span></div>
      `;

      let totalDiamondsPerSec = 0;
      for (let i=0; i<7; i++) {
        if (state.miners[i]>0) totalDiamondsPerSec += (minerBase[i].baseProd*state.globalMinerMult+state.flatMinerBonus)*state.miners[i];
      }
      const totalOilPerSec = state.oilMiner*OIL_MINER_PROD + state.oilPerSecBonus;
      document.getElementById('autoInfo').innerHTML = `⛏️ ${totalDiamondsPerSec.toFixed(2)} 💎/с | 🛢️ ${totalOilPerSec.toFixed(3)}/с`;
      renderTab();
    }

    function renderTab() {
      const c = document.getElementById('tabContent');
      c.innerHTML = '';
      if (currentTab==='miners') renderMiners(c);
      else if (currentTab==='shop') renderShop(c);
      else if (currentTab==='quests') renderQuests(c);
      else if (currentTab==='profile') renderProfile(c);
    }

    function renderMiners(c) {
      let h = '';
      for (let i=0; i<7; i++) {
        const m=minerBase[i]; const cnt=state.miners[i];
        const prod=m.baseProd*state.globalMinerMult+state.flatMinerBonus;
        const cost=getMinerCost(i);
        h+=`<div class="miner-row"><div><div>👷 Шахтёр ур.${m.lvl} (${cnt} шт.)</div><div class="prod">+${prod.toFixed(2)} 💎/с</div></div>
        <button class="btn-sm hire-miner" data-idx="${i}" ${state.money<cost?'disabled':''}>💰 ${cost}</button></div>`;
      }
      h+=`<div class="miner-row"><div><div>🛢️ Нефтяной шахтёр (${state.oilMiner} шт.)</div><div class="prod">+${OIL_MINER_PROD} 🛢️/с</div></div>
      <button class="btn-sm" id="hireOilMiner" ${state.oil<OIL_MINER_COST?'disabled':''}>🛢️ ${OIL_MINER_COST}</button></div>`;
      c.innerHTML=h;
      c.querySelectorAll('.hire-miner').forEach(b=>b.addEventListener('click', ()=>hireMiner(parseInt(b.dataset.idx))));
      document.getElementById('hireOilMiner')?.addEventListener('click', hireOilMiner);
    }

    function renderShop(c) {
      const pc=getPickaxeCost();
      c.innerHTML=`
        <div class="shop-item"><div><div>⛏️ Улучшить кирку (ур.${state.pickaxeLevel})</div><div class="prod">+${state.pickaxeLevel+1} за клик</div></div>
        <button class="btn-sm" id="buyPickaxe" ${state.money<pc?'disabled':''}>💰 ${pc}</button></div>
        <div class="shop-item"><div><div>📦 Простой бокс (100💰)</div><div class="prod">Малые награды</div></div>
        <button class="btn-sm" id="box100" ${state.money<100?'disabled':''}>💰 100</button></div>
        <div class="shop-item"><div><div>📦 Средний бокс (1000💰)</div><div class="prod">Шанс на нефть</div></div>
        <button class="btn-sm" id="box1000" ${state.money<1000?'disabled':''}>💰 1000</button></div>
        <div class="shop-item"><div><div>✨ Премиум бокс (10🛢️)</div><div class="prod">Разовые бонусы</div></div>
        <button class="btn-sm" id="premiumBox" ${state.oil<10?'disabled':''}>🛢️ 10</button></div>
        <div style="margin-top:10px;font-size:0.8em;opacity:0.6;text-align:center;">1💎 = 0.05💰</div>`;
      document.getElementById('buyPickaxe')?.addEventListener('click', buyPickaxe);
      document.getElementById('box100')?.addEventListener('click', openBox100);
      document.getElementById('box1000')?.addEventListener('click', openBox1000);
      document.getElementById('premiumBox')?.addEventListener('click', openPremiumBox);
    }

    function renderQuests(c) {
      let h=`<div class="shop-item"><div><div>🎁 Ежедневная нефть</div><div class="prod">${canClaimDaily()?'+2 🛢️':'Уже получено'}</div></div>
        <button class="btn-sm" id="dailyOilBtn" ${!canClaimDaily()?'disabled':''}>Забрать</button></div>
        <div style="margin-top:12px;font-weight:600;">📋 Задания</div>`;
      quests.forEach(q=>{
        const done=state.completedQuests.includes(q.id);
        const can=!done && q.check();
        h+=`<div class="quest-item"><div><div>${q.desc}</div><div class="prod">🛢️ ${q.reward}</div></div>
          <button class="btn-sm claim-q" data-id="${q.id}" ${!can?'disabled':''}>${done?'✓':'Взять'}</button></div>`;
      });
      c.innerHTML=h;
      document.getElementById('dailyOilBtn')?.addEventListener('click', claimDailyOil);
      c.querySelectorAll('.claim-q').forEach(b=>b.addEventListener('click', ()=>claimQuest(b.dataset.id)));
    }

    function renderProfile(c) {
      const refLink = `https://t.me/${tg?.initDataUnsafe?.bot_username || 'your_bot'}?startapp=ref_${userId}`;
      const totalPlayTime = state.totalPlayTime + (state.playTimeStart ? Date.now() - state.playTimeStart : 0);
      const hours = Math.floor(totalPlayTime / 3600000);
      const minutes = Math.floor((totalPlayTime % 3600000) / 60000);

      let h = `
        <div class="profile-field"><b>ID:</b> ${userId}</div>
        <div class="profile-field"><b>Имя:</b> ${currentUser.first_name}</div>
        <div class="profile-field"><b>Общее время в игре:</b> ${hours} ч ${minutes} мин</div>
        <div class="profile-field"><b>Реф-ссылка:</b> <a href="${refLink}" target="_blank">${refLink}</a></div>
        <button class="btn-sm" onclick="navigator.clipboard?.writeText('${refLink}')">📋 Копировать</button>
        <div style="margin-top:12px;">
          <button class="btn-sm" id="withdrawBtn" ${state.oil<50?'disabled':''}>💸 Вывести нефть</button>
          <button class="btn-sm" id="depositBtn">💰 Пополнить нефть</button>
        </div>`;

      // Админ-панель
      if (isAdmin) {
        h += `<div class="admin-panel"><h4>👑 Админ-панель</h4>
          <div><b>Управление пользователями (текущее устройство)</b></div>
          <div id="usersList"></div>
          <button class="btn-sm" id="giveOilBtn">Выдать 50🛢️ выбранному</button>
          <button class="btn-sm" id="removeOilBtn">Снять 50🛢️</button>
          <button class="btn-sm" id="giveBoostBtn">Дать бустер x2 на 30м</button>
          <hr>
          <div><b>Ивенты</b></div>
          <button class="btn-sm" id="eventX2">Включить x2 алмазы на 1ч (глобально)</button>
          <button class="btn-sm" id="eventX2off">Выключить ивент</button>
          <hr>
          <div><b>Рекламный баннер</b></div>
          <input id="bannerText" placeholder="Текст баннера" style="width:100%; margin:4px 0;">
          <input id="bannerLink" placeholder="Ссылка" style="width:100%; margin:4px 0;">
          <button class="btn-sm" id="saveBanner">Сохранить баннер</button>
          <hr>
          <div><b>Задания за подписку</b></div>
          <input id="subLink" placeholder="Ссылка на канал" style="width:100%; margin:4px 0;">
          <input id="subReward" placeholder="Награда (нефть)" style="width:100%; margin:4px 0;">
          <button class="btn-sm" id="addSubQuest">Добавить задание</button>
          <div id="subQuestsList"></div>
        </div>`;
      }
      c.innerHTML = h;

      // Обработчики
      document.getElementById('withdrawBtn')?.addEventListener('click', (e) => {
        if (state.oil < 50) {
          e.preventDefault();
          showPopup('Недостаточно нефти для вывода (мин. 50 🛢️)');
        } else {
          window.open(`https://t.me/nukm0?text=Вывести%20нефть%20${Math.floor(state.oil)}%20🛢️`, '_blank');
        }
      });
      document.getElementById('depositBtn')?.addEventListener('click', () => {
        window.open(`https://t.me/nukm0?text=Пополнить%20нефть`, '_blank');
      });

      // Админские функции (только для демо, работа с localStorage)
      if (isAdmin) {
        const usersKey = 'minerUsers';
        let users = JSON.parse(localStorage.getItem(usersKey) || '[]');
        function saveUsers() { localStorage.setItem(usersKey, JSON.stringify(users)); }
        function renderUsers() {
          const list = document.getElementById('usersList');
          if (!list) return;
          list.innerHTML = users.map((u,idx) => `<div><input type="radio" name="userSelect" value="${idx}"> ${u.name} (ID:${u.id}) 🛢️${u.oil.toFixed(1)}</div>`).join('');
        }
        renderUsers();

        // Добавим текущего пользователя, если его нет
        if (!users.find(u => u.id === userId)) {
          users.push({ id: userId, name: currentUser.first_name, oil: state.oil, money: state.money });
          saveUsers();
        }

        document.getElementById('giveOilBtn')?.addEventListener('click', () => {
          const sel = document.querySelector('input[name="userSelect"]:checked');
          if (sel) {
            const idx = parseInt(sel.value);
            users[idx].oil += 50;
            saveUsers(); renderUsers();
            showPopup('Выдано 50🛢️ пользователю');
          }
        });
        document.getElementById('removeOilBtn')?.addEventListener('click', () => {
          const sel = document.querySelector('input[name="userSelect"]:checked');
          if (sel) {
            const idx = parseInt(sel.value);
            users[idx].oil = Math.max(0, users[idx].oil - 50);
            saveUsers(); renderUsers();
            showPopup('Снято 50🛢️');
          }
        });
        document.getElementById('giveBoostBtn')?.addEventListener('click', () => {
          const sel = document.querySelector('input[name="userSelect"]:checked');
          if (sel) {
            // Не можем напрямую дать бустер другому пользователю (разные localStorage)
            showPopup('Бустер можно выдать только на этом устройстве (текущему)');
            state.boostActive = true;
            state.boostEnd = Date.now() + 30*60*1000;
            updateUI(); saveState();
          }
        });
        document.getElementById('eventX2')?.addEventListener('click', () => {
          state.globalMinerMult *= 2;
          showPopup('Ивент: x2 добыча шахтёров на 1 час! (условно)');
          updateUI(); saveState();
        });
        document.getElementById('eventX2off')?.addEventListener('click', () => {
          state.globalMinerMult = 1.0;
          showPopup('Ивент отключён');
          updateUI(); saveState();
        });
        document.getElementById('saveBanner')?.addEventListener('click', () => {
          const text = document.getElementById('bannerText').value;
          const link = document.getElementById('bannerLink').value;
          localStorage.setItem('adBanner', JSON.stringify({text, link}));
          showPopup('Баннер сохранён');
        });
        document.getElementById('addSubQuest')?.addEventListener('click', () => {
          const link = document.getElementById('subLink').value;
          const reward = parseFloat(document.getElementById('subReward').value);
          if (link && reward > 0) {
            let subs = JSON.parse(localStorage.getItem('subQuests') || '[]');
            subs.push({ link, reward, done: false });
            localStorage.setItem('subQuests', JSON.stringify(subs));
            document.getElementById('subLink').value = '';
            document.getElementById('subReward').value = '';
            renderSubQuests();
          }
        });
        function renderSubQuests() {
          const list = document.getElementById('subQuestsList');
          if (!list) return;
          let subs = JSON.parse(localStorage.getItem('subQuests') || '[]');
          list.innerHTML = subs.map((q, idx) => `<div>📢 ${q.link} (🛢️${q.reward}) <button data-idx="${idx}">Выполнить</button></div>`).join('');
          list.querySelectorAll('button').forEach(b => b.addEventListener('click', (e) => {
            const idx = parseInt(e.target.dataset.idx);
            let subs = JSON.parse(localStorage.getItem('subQuests') || '[]');
            if (subs[idx] && !subs[idx].done) {
              subs[idx].done = true;
              state.oil += subs[idx].reward;
              localStorage.setItem('subQuests', JSON.stringify(subs));
              showPopup(`За подписку: +${subs[idx].reward} 🛢️`);
              updateUI(); saveState();
              renderSubQuests();
            }
          }));
        }
        renderSubQuests();
      }

      // Рекламный баннер (для всех)
      const ad = JSON.parse(localStorage.getItem('adBanner') || 'null');
      if (ad && ad.text) {
        const bannerDiv = document.createElement('div');
        bannerDiv.style.cssText = 'margin-top:10px;padding:10px;background:rgba(255,215,0,0.1);border-radius:12px;text-align:center;';
        bannerDiv.innerHTML = `<a href="${ad.link}" target="_blank" style="color:#f7d794;">${ad.text}</a>`;
        c.appendChild(bannerDiv);
      }
    }

    // Табы
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', (e) => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        currentTab = e.target.dataset.tab;
        updateUI();
      });
    });

    document.getElementById('sellAllBtn').addEventListener('click', sellAll);

    // Авто-тик
    function autoTick() {
      if (state.boostActive && Date.now() >= state.boostEnd) {
        state.boostActive = false; state.boostEnd = 0;
      }
      let diamondsGain = 0;
      for (let i=0; i<7; i++) {
        const cnt = state.miners[i];
        if (cnt>0) diamondsGain += (minerBase[i].baseProd*state.globalMinerMult+state.flatMinerBonus)*cnt;
      }
      const oilGain = state.oilMiner*OIL_MINER_PROD + state.oilPerSecBonus;
      if (diamondsGain>0) { state.diamonds+=diamondsGain; state.totalDiamondsMined+=diamondsGain; }
      if (oilGain>0) state.oil+=oilGain;
      updateUI(); saveState();
    }

    // Инициализация
    loadState();
    if (!state.registered) register();
    applyOfflineProgress();
    updateUI();
    setInterval(autoTick, 1000);
    window.addEventListener('beforeunload', saveState);
  })();
</script>
</body>
</html>
